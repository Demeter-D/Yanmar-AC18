<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0e110d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="AC-18" />
<title>Yanmar AC-18 — Field Service Manual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Black&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e110d;
    --panel: #161a14;
    --panel-2: #1d211a;
    --panel-3: #262b22;
    --text: #e6e9dc;
    --text-2: #b1b6a8;
    --text-3: #6a6e64;
    --rule: #2a2e26;
    --rule-2: #383d33;
    --hi: #f4d20a;
    --hi-soft: #6a5b09;
    --teal: #5db3a3;
    --danger: #d4502b;
    --good: #6db04e;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: "Archivo", system-ui, sans-serif; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
  body { min-height: 100vh; min-height: 100dvh; overflow-x: hidden; }
  body.no-scroll { overflow: hidden; }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  .black { font-family: "Archivo Black", "Archivo", sans-serif; font-weight: 900; letter-spacing: -0.01em; }
  ::selection { background: var(--hi); color: #0e110d; }

  /* Hazard stripe pattern */
  .hazard {
    background-image: repeating-linear-gradient(135deg,
      var(--hi) 0 16px, var(--hi) 16px 16px,
      #0e110d 16px 32px);
    height: 8px;
  }
  .hazard-sm { height: 4px; background-image: repeating-linear-gradient(135deg, var(--hi) 0 8px, #0e110d 8px 16px); }

  /* Track tread pattern (decorative dividers) */
  .tread {
    height: 18px;
    background-image: repeating-linear-gradient(90deg,
      transparent 0 4px,
      var(--rule) 4px 24px,
      transparent 24px 28px);
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    opacity: 0.6;
  }

  /* App shell */
  .app { display: grid; grid-template-columns: 300px 1fr; min-height: 100vh; min-height: 100dvh; }

  /* Sidebar (desktop) */
  .rail {
    background: #0a0c09; color: var(--text); padding: 24px 22px;
    position: sticky; top: 0; height: 100vh; height: 100dvh; overflow-y: auto;
    display: flex; flex-direction: column; gap: 22px;
    border-right: 1px solid var(--rule);
  }
  .brand { padding-bottom: 16px; border-bottom: 1px solid var(--rule); }
  .brand-line { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .brand-pill { font-family: "JetBrains Mono", monospace; font-size: 10px; padding: 4px 8px; background: var(--hi); color: #0e110d; letter-spacing: 0.16em; font-weight: 700; }
  .brand-pill.alt { background: transparent; color: var(--text-3); border: 1px solid var(--rule-2); }
  .brand-title { font-family: "Archivo Black"; font-size: 36px; line-height: 0.9; letter-spacing: -0.02em; margin: 0; }
  .brand-title .dot { color: var(--hi); }
  .brand-sub { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--text-3); margin-top: 8px; line-height: 1.5; letter-spacing: 0.04em; }

  .nav { display: flex; flex-direction: column; gap: 1px; }
  .nav-group { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.22em; color: var(--text-3); padding: 14px 0 8px; }
  .nav-item {
    display: flex; align-items: center; gap: 14px;
    padding: 11px 12px; border: none; background: transparent; color: var(--text-2); text-align: left;
    font-family: inherit; font-size: 14px; cursor: pointer; min-height: 44px;
    transition: all 120ms ease; border-left: 3px solid transparent;
  }
  .nav-item .num { font-family: "Archivo Black"; font-size: 16px; color: var(--text-3); min-width: 24px; }
  .nav-item:hover { background: var(--panel); color: var(--text); }
  .nav-item.active { background: var(--panel); color: var(--text); border-left-color: var(--hi); }
  .nav-item.active .num { color: var(--hi); }

  .rail-foot { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--rule); font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--text-3); line-height: 1.7; letter-spacing: 0.04em; }

  /* Mobile topbar */
  .topbar { display: none; }
  .scrim { display: none; }
  @media (max-width: 880px) {
    .app { grid-template-columns: 1fr; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      position: sticky; top: 0; z-index: 40;
      background: #0a0c09; color: var(--text);
      padding: calc(env(safe-area-inset-top, 0) + 12px) 16px 0;
      padding-left: calc(env(safe-area-inset-left, 0) + 16px);
      padding-right: calc(env(safe-area-inset-right, 0) + 16px);
      border-bottom: 1px solid var(--rule);
    }
    .topbar-inner { display: flex; align-items: center; justify-content: space-between; gap: 12px; width: 100%; padding-bottom: 12px; }
    .topbar-brand { display: flex; align-items: center; gap: 10px; min-width: 0; cursor: pointer; user-select: none; transition: opacity .15s ease; }
    .topbar-brand:hover { opacity: 0.75; }
    .topbar-brand:focus-visible { outline: 2px solid var(--hi); outline-offset: 4px; border-radius: 2px; }
    .topbar-mark { font-family: "Archivo Black"; font-size: 22px; line-height: 1; letter-spacing: -0.02em; }
    .topbar-mark .dot { color: var(--hi); }
    .topbar-meta { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--text-3); letter-spacing: 0.14em; line-height: 1.4; }
    .topbar-meta strong { display: block; color: var(--text); font-family: "Archivo", sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.02em; margin-top: 2px; }
    .topbar-active { text-align: right; max-width: 50%; font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--text-3); letter-spacing: 0.12em; }
    .topbar-active strong { display: block; color: var(--hi); font-family: "Archivo", sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0; margin-top: 2px; }
    .menu-btn {
      background: transparent; border: 1px solid var(--rule-2); color: var(--text);
      width: 44px; height: 44px; display: grid; place-items: center; cursor: pointer; padding: 0;
      font-family: inherit; flex-shrink: 0;
    }
    .menu-btn:active { background: var(--panel); }
    .menu-btn svg { width: 20px; height: 20px; }
    .topbar-hazard { width: 100%; }

    .rail {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 86vw; max-width: 340px; height: 100vh; height: 100dvh;
      z-index: 60; transform: translateX(-100%); transition: transform 240ms ease;
      padding: calc(env(safe-area-inset-top, 0) + 22px) 22px calc(env(safe-area-inset-bottom, 0) + 22px);
      padding-left: calc(env(safe-area-inset-left, 0) + 22px);
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .rail.open { transform: translateX(0); }
    .scrim {
      display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50;
      opacity: 0; pointer-events: none; transition: opacity 240ms ease;
    }
    .scrim.show { opacity: 1; pointer-events: auto; }
    .rail-close {
      align-self: flex-end; background: transparent; border: 1px solid var(--rule-2); color: var(--text);
      width: 36px; height: 36px; cursor: pointer; padding: 0; display: grid; place-items: center; margin-top: -8px;
    }
  }
  @media (min-width: 881px) { .rail-close { display: none; } }

  /* Main */
  main { padding: 0; min-width: 0; }
  .doc { max-width: 1000px; margin: 0 auto; padding: 36px 48px 120px; }
  @media (max-width: 880px) {
    .doc { padding: 24px 18px 80px;
      padding-left: calc(env(safe-area-inset-left, 0) + 18px);
      padding-right: calc(env(safe-area-inset-right, 0) + 18px);
    }
  }

  /* Section marker */
  .sec-marker { display: flex; align-items: stretch; gap: 18px; margin: 0 0 24px; padding-bottom: 18px; border-bottom: 1px solid var(--rule); }
  .sec-marker-num {
    font-family: "Archivo Black"; font-size: 96px; line-height: 0.85; color: var(--hi);
    letter-spacing: -0.04em; padding-right: 4px;
  }
  @media (max-width: 540px) { .sec-marker-num { font-size: 64px; } }
  .sec-marker-body { display: flex; flex-direction: column; justify-content: flex-end; flex: 1; min-width: 0; }
  .sec-marker-tag { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.22em; color: var(--text-3); margin-bottom: 6px; }
  .sec-marker-title { font-family: "Archivo Black"; font-size: clamp(24px, 5.5vw, 38px); line-height: 1; letter-spacing: -0.02em; margin: 0; text-transform: uppercase; }
  .sec-lede { font-size: clamp(15px, 4vw, 17px); color: var(--text-2); line-height: 1.55; max-width: 64ch; margin: 8px 0 36px; }

  h3 { font-family: "Archivo Black"; font-size: clamp(18px, 5vw, 22px); margin: 44px 0 16px; text-transform: uppercase; letter-spacing: -0.005em; }
  h3.with-tag { display: flex; align-items: baseline; gap: 12px; }
  h3 .tag { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--text-3); letter-spacing: 0.18em; font-weight: 400; text-transform: none; }
  h4 { font-family: "JetBrains Mono", monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-3); margin: 28px 0 12px; }
  p { line-height: 1.6; color: var(--text-2); margin: 0 0 14px; }

  /* Cards & boxes */
  .grid { display: grid; gap: 12px; }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  @media (max-width: 720px) { .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; } .grid-2 { grid-template-columns: 1fr; } }

  /* Stat tile */
  .stat { background: var(--panel); border: 1px solid var(--rule); padding: 16px 18px; position: relative; }
  .stat-label { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-3); margin-bottom: 8px; }
  .stat-value { font-family: "Archivo Black"; font-size: 22px; color: var(--text); line-height: 1; letter-spacing: -0.01em; }
  .stat-value.mono { font-family: "JetBrains Mono", monospace; font-weight: 600; font-size: 20px; }
  .stat-unit { font-size: 12px; color: var(--text-3); margin-left: 4px; font-family: "Archivo"; font-weight: 400; }
  .stat-note { font-size: 11px; color: var(--text-3); margin-top: 6px; font-family: "JetBrains Mono", monospace; }

  /* Hero */
  .hero { padding: 24px 0 0; }
  .hero-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
  .hero-pill { font-family: "JetBrains Mono", monospace; font-size: 10px; padding: 5px 10px; letter-spacing: 0.18em; font-weight: 600; }
  .hero-pill.hi { background: var(--hi); color: #0e110d; }
  .hero-pill.dim { color: var(--text-3); border: 1px solid var(--rule-2); }
  .hero-title { font-family: "Archivo Black"; font-size: clamp(64px, 16vw, 156px); line-height: 0.82; letter-spacing: -0.05em; margin: 0; text-transform: uppercase; }
  .hero-title .dot { color: var(--hi); }
  .hero-title .reg { font-family: "Archivo"; font-weight: 500; font-size: 0.36em; letter-spacing: 0.04em; display: block; margin-top: 14px; color: var(--text-2); text-transform: uppercase; }
  .hero-sub { font-size: clamp(15px, 4.2vw, 19px); color: var(--text-2); margin: 28px 0 0; max-width: 60ch; line-height: 1.5; }

  /* Meta strip */
  .meta-strip { display: flex; flex-wrap: wrap; gap: 0; margin: 36px 0 0; border: 1px solid var(--rule); }
  .meta-cell { flex: 1 1 140px; padding: 14px 16px; border-right: 1px solid var(--rule); border-bottom: 1px solid var(--rule); margin-bottom: -1px; margin-right: -1px; min-width: 140px; }
  .meta-cell:last-child { border-right: 1px solid var(--rule); }
  .meta-k { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-3); margin-bottom: 4px; }
  .meta-v { font-family: "Archivo Black"; font-size: 17px; color: var(--text); line-height: 1.1; }
  .meta-v.mono { font-family: "JetBrains Mono", monospace; font-weight: 600; font-size: 14px; }

  /* Callouts with hazard top */
  .callout { background: var(--panel); padding: 14px 18px; margin: 22px 0; font-size: 14px; color: var(--text-2); line-height: 1.55; position: relative; }
  .callout::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--hi); }
  .callout.warn { background: #2a2218; }
  .callout.warn::before { background-image: repeating-linear-gradient(135deg, var(--hi) 0 10px, #0e110d 10px 20px); }
  .callout.danger { background: #2a1815; }
  .callout.danger::before { background: var(--danger); }
  .callout.info::before { background: var(--teal); }
  .callout-tag { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--hi); margin-bottom: 4px; display: block; font-weight: 600; }
  .callout.warn .callout-tag { color: var(--hi); }
  .callout.danger .callout-tag { color: var(--danger); }
  .callout.info .callout-tag { color: var(--teal); }

  /* Procedure */
  .proc { border: 1px solid var(--rule); background: var(--panel); margin: 18px 0 28px; }
  .proc-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 18px; cursor: pointer; user-select: none; flex-wrap: wrap; border-left: 4px solid transparent; transition: all 140ms ease; }
  .proc-head:hover { background: var(--panel-2); border-left-color: var(--hi); }
  .proc.open .proc-head { background: var(--panel-2); border-left-color: var(--hi); border-bottom: 1px solid var(--rule); }
  .proc-title { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; min-width: 0; }
  .proc-tag { font-family: "JetBrains Mono", monospace; font-size: 11px; padding: 4px 9px; background: var(--hi); color: #0e110d; letter-spacing: 0.08em; font-weight: 700; flex-shrink: 0; }
  .proc-name { font-family: "Archivo"; font-weight: 700; font-size: clamp(15px, 4.2vw, 18px); letter-spacing: -0.005em; color: var(--text); }
  .proc-meta { display: flex; gap: 14px; font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--text-3); align-items: center; flex-wrap: wrap; letter-spacing: 0.04em; }
  .proc-meta strong { color: var(--text); font-weight: 600; }
  .proc-chev { width: 22px; height: 22px; display: grid; place-items: center; transition: transform 200ms ease; color: var(--text-3); }
  .proc.open .proc-chev { transform: rotate(90deg); color: var(--hi); }
  .proc-body { padding: 22px 22px 26px; display: none; }
  .proc.open .proc-body { display: block; }
  @media (max-width: 540px) {
    .proc-meta span:not(.proc-chev) { display: none; }
    .proc-body { padding: 18px 16px 22px !important; }
  }

  .step-bar { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; padding: 10px 14px; background: var(--bg); border: 1px solid var(--rule); flex-wrap: wrap; }
  .step-bar-progress { flex: 1; height: 4px; min-width: 120px; background: var(--rule); position: relative; overflow: hidden; }
  .step-bar-progress::after { content: ""; position: absolute; inset: 0; background: var(--hi); transform-origin: left; transform: scaleX(var(--p, 0)); transition: transform 250ms ease; }
  .step-bar-text { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--text-3); letter-spacing: 0.04em; }
  .step-bar button { font-family: inherit; font-size: 11px; padding: 4px 10px; background: transparent; border: 1px solid var(--rule-2); color: var(--text-2); cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; }
  .step-bar button:hover { background: var(--hi); color: #0e110d; border-color: var(--hi); }

  .step { display: grid; grid-template-columns: 28px 1fr; gap: 14px; padding: 14px 0; border-top: 1px solid var(--rule); }
  .step:first-of-type { border-top: 0; padding-top: 4px; }
  .step-check {
    width: 22px; height: 22px; border: 1.5px solid var(--text-3); background: transparent; cursor: pointer;
    display: grid; place-items: center; padding: 0; transition: all 120ms ease; margin-top: 2px;
  }
  .step-check:hover { border-color: var(--hi); }
  .step-check.done { background: var(--hi); border-color: var(--hi); }
  .step-check.done::after { content: "✓"; color: #0e110d; font-size: 14px; line-height: 1; font-weight: 700; }
  .step-body .step-num { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--text-3); letter-spacing: 0.06em; margin-right: 10px; font-weight: 600; }
  .step-body .step-text { font-size: 15px; line-height: 1.55; color: var(--text); }
  .step.done .step-body .step-text { color: var(--text-3); text-decoration: line-through; text-decoration-color: var(--text-3); }
  .step-tip { font-size: 13px; color: var(--text-3); margin-top: 6px; line-height: 1.5; padding-left: 12px; border-left: 2px solid var(--rule-2); }

  /* Parts pills */
  .parts-strip { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0 18px; }
  .part-pill { display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px; background: var(--bg); border: 1px solid var(--rule); font-size: 12px; }
  .part-pill .mono { font-size: 11px; color: var(--text); }
  .part-pill .label { color: var(--text-3); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-family: "JetBrains Mono", monospace; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 11px 14px; border-bottom: 1px solid var(--rule); vertical-align: top; color: var(--text); }
  th { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-3); font-weight: 600; background: var(--panel); border-bottom: 1px solid var(--rule); border-top: 1px solid var(--rule); }
  td.mono, th.mono { font-family: "JetBrains Mono", monospace; font-size: 13px; }
  tr:hover td { background: var(--panel-2); }
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  @media (max-width: 540px) {
    .table-scroll { margin: 0 -18px; padding: 0 18px; }
    .table-scroll table { min-width: 480px; }
  }

  /* Spec block */
  .specblock { display: grid; grid-template-columns: 220px 1fr; gap: 0; border: 1px solid var(--rule); }
  .specblock > div { padding: 11px 16px; border-bottom: 1px solid var(--rule); }
  .specblock > div:nth-last-child(-n+2) { border-bottom: none; }
  .specblock .k { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--text-3); letter-spacing: 0.1em; background: var(--panel); text-transform: uppercase; }
  .specblock .v { font-family: "Archivo"; font-weight: 500; font-size: 14px; color: var(--text); }
  @media (max-width: 540px) {
    .specblock { grid-template-columns: 1fr; }
    .specblock .k { border-bottom: none; padding-bottom: 4px; }
    .specblock .v { padding-top: 0; padding-bottom: 12px; }
  }

  /* Timeline */
  .timeline { position: relative; padding-left: 32px; margin: 16px 0 28px; }
  .timeline::before { content: ""; position: absolute; left: 7px; top: 8px; bottom: 8px; width: 2px; background: var(--rule); }
  .tl-row { position: relative; padding: 16px 0 16px 14px; display: grid; grid-template-columns: 150px 1fr; gap: 24px; align-items: start; border-bottom: 1px dashed var(--rule); }
  .tl-row:last-child { border-bottom: 0; }
  .tl-row::before { content: ""; position: absolute; left: -32px; top: 24px; width: 14px; height: 14px; background: var(--bg); border: 2px solid var(--text-3); }
  .tl-row.major::before { background: var(--hi); border-color: var(--hi); }
  .tl-hours { font-family: "Archivo Black"; font-size: 14px; color: var(--text); letter-spacing: 0.04em; text-transform: uppercase; line-height: 1.1; }
  .tl-hours small { display: block; font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--text-3); font-weight: 400; letter-spacing: 0.1em; margin-top: 4px; text-transform: none; }
  .tl-tasks { display: flex; flex-wrap: wrap; gap: 6px; }
  .tl-task { background: var(--panel); border: 1px solid var(--rule); padding: 6px 11px; font-size: 12px; color: var(--text-2); font-family: inherit; cursor: pointer; transition: all 120ms ease; }
  .tl-task:hover { background: var(--panel-2); border-color: var(--rule-2); transform: translateY(-1px); }
  .tl-task.replace { background: var(--hi); color: #0e110d; border-color: var(--hi); font-weight: 600; }
  .tl-task.replace:hover { background: #ffe21d; }
  @media (max-width: 540px) {
    .tl-row { grid-template-columns: 1fr; gap: 8px; padding: 12px 0; }
  }

  /* Search */
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .search-input {
    flex: 1; min-width: 100%; padding: 12px 14px; background: var(--panel); border: 1px solid var(--rule);
    font-family: inherit; font-size: 16px; color: var(--text); min-height: 44px;
  }
  .search-input:focus { outline: none; border-color: var(--hi); }
  .search-input::placeholder { color: var(--text-3); }
  @media (min-width: 540px) { .search-input { min-width: 220px; font-size: 14px; } }
  .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }

  .chip:hover { background: var(--panel-2); color: var(--text); }
  .chip.on { background: var(--hi); color: #0e110d; border-color: var(--hi); font-weight: 700; }

  /* Mobile parts cards */
  .parts-cards { display: none; }
  @media (max-width: 720px) {
    .parts-table-wrap { display: none; }
    .parts-cards { display: flex; flex-direction: column; gap: 10px; }
    .pcard { background: var(--panel); border: 1px solid var(--rule); padding: 14px; border-left: 3px solid var(--hi); }
    .pcard-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
    .pcard-name { font-family: "Archivo"; font-weight: 700; font-size: 15px; line-height: 1.3; color: var(--text); }
    .pcard-cat { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-3); white-space: nowrap; padding-top: 3px; }
    .pcard-row { display: grid; grid-template-columns: 70px 1fr; gap: 8px; padding: 6px 0; border-top: 1px dashed var(--rule); font-size: 13px; }
    .pcard-row .k { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); padding-top: 3px; }
    .pcard-row .v { color: var(--text); word-break: break-word; }
    .pcard-alts { display: flex; flex-wrap: wrap; gap: 4px; }
    .pcard-alt { font-family: "JetBrains Mono", monospace; font-size: 11px; padding: 2px 6px; background: var(--bg); border: 1px solid var(--rule); }
    .pcard-notes { font-size: 12px; color: var(--text-3); margin-top: 2px; line-height: 1.4; }
  }

  /* Log */
  .log-grid { display: grid; grid-template-columns: 120px 90px 1fr auto; gap: 8px; margin-bottom: 12px; }
  @media (max-width: 600px) {
    .log-grid { grid-template-columns: 1fr 1fr; }

  /* Details element styling */
  details { background: var(--panel); border: 1px solid var(--rule); padding: 14px 18px; border-left: 3px solid var(--rule-2); }
  details[open] { border-left-color: var(--hi); }

  details summary::-webkit-details-marker { display: none; }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

function Procedure({ p, openByDefault = false }) {
  const [open, setOpen] = React.useState(openByDefault);
  const [checked, setChecked] = React.useState(() => p.steps.map(() => false));
  const done = checked.filter(Boolean).length;
  const pct = done / p.steps.length;

  const toggle = (i) => setChecked(prev => prev.map((v, idx) => idx === i ? !v : v));
  const reset = (e) => { e.stopPropagation(); setChecked(p.steps.map(() => false)); };

  return (
    <div className={"proc" + (open ? " open" : "")} id={p.id}>
      <div className="proc-head" onClick={() => setOpen(o => !o)}>
        <div className="proc-title">
          <span className="proc-tag">{p.tag}</span>
          <span className="proc-name">{p.name}</span>
        </div>
        <div className="proc-meta">
          <span>⏱ <strong>{p.time}</strong></span>
          <span>↻ <strong>{p.interval.split(" / ")[0].replace("Every ", "")}</strong></span>
          <span className="proc-chev">▸</span>
        </div>
      </div>
      <div className="proc-body">
        <div className="grid grid-3" style={{marginBottom: 18}}>
          <div className="stat"><div className="stat-label">Interval</div><div className="stat-value mono" style={{fontSize: 13}}>{p.interval}</div></div>
          <div className="stat"><div className="stat-label">Time</div><div className="stat-value mono">{p.time}</div></div>
          <div className="stat"><div className="stat-label">Difficulty</div><div className="stat-value" style={{fontSize: 15}}>{p.difficulty}</div></div>
        </div>

        {p.parts.length > 0 && (
          <React.Fragment>
            <h4>Parts</h4>
            <div className="parts-strip">
              {p.parts.map((pt, i) => (
                <span className="part-pill" key={i}>
                  <span className="label">{pt.label}</span>
                  <span className="mono">{pt.code}</span>
                </span>
              ))}
            </div>
          </React.Fragment>
        )}

        <h4>Tools</h4>
        <p style={{fontSize: 14, color: "var(--text-2)"}}>{p.tools.join(" · ")}</p>

        <h4>Procedure</h4>
        <div className="step-bar">
          <div className="step-bar-progress" style={{"--p": pct}} />
          <div className="step-bar-text">{done} / {p.steps.length} DONE</div>
          <button onClick={reset}>Reset</button>
        </div>

        {p.steps.map((s, i) => (
          <div key={i} className={"step" + (checked[i] ? " done" : "")}>
            <button className={"step-check" + (checked[i] ? " done" : "")} onClick={() => toggle(i)} aria-label={"step " + (i+1)} />
            <div className="step-body">
              <div>
                <span className="step-num mono">[{String(i+1).padStart(2, "0")}]</span>
                <span className="step-text">{s.t}</span>
              </div>
              {s.tip && <div className="step-tip">{s.tip}</div>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ServiceLog() {
  const [rows, setRows] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("ac18-log") || "[]"); }
    catch { return []; }
  });
  const [draft, setDraft] = React.useState({date: "", hours: "", work: ""});

  React.useEffect(() => {
    localStorage.setItem("ac18-log", JSON.stringify(rows));
  }, [rows]);

  const add = () => {
    if (!draft.date && !draft.hours && !draft.work) return;
    setRows([{...draft, id: Date.now()}, ...rows]);
    setDraft({date: "", hours: "", work: ""});
  };
  const del = (id) => setRows(rows.filter(r => r.id !== id));

  return (
    <div>
      <p style={{fontSize: 14}}>A persistent service log lives in your browser. Useful for keeping track between visits; not a substitute for the paper book that lives with the tractor.</p>
      <div className="log-grid">
        <input className="search-input" placeholder="Date" value={draft.date} onChange={e => setDraft({...draft, date: e.target.value})}/>
        <input className="search-input" placeholder="Hours" inputMode="numeric" value={draft.hours} onChange={e => setDraft({...draft, hours: e.target.value})}/>
        <input className="search-input work" placeholder="Work carried out (oil & filter, track tension, etc.)" value={draft.work} onChange={e => setDraft({...draft, work: e.target.value})}/>
        <button className="add" onClick={add} style={{padding: "12px 22px", background: "var(--hi)", color: "#0e110d", border: "none", cursor: "pointer", letterSpacing: "0.1em", textTransform: "uppercase", fontSize: 12, fontFamily: "inherit", fontWeight: 700}}>Add entry</button>
      </div>
      {rows.length > 0 ? (
        <div className="table-scroll">
          <table>
            <thead><tr><th style={{width: 120}}>Date</th><th style={{width: 80}}>Hours</th><th>Work</th><th style={{width: 30}}></th></tr></thead>
            <tbody>
              {rows.map(r => (
                <tr key={r.id}>
                  <td className="mono">{r.date || "—"}</td>
                  <td className="mono">{r.hours || "—"}</td>
                  <td>{r.work}</td>
                  <td><button onClick={() => del(r.id)} style={{background: "transparent", border: "none", color: "var(--text-3)", cursor: "pointer", fontSize: 20, padding: "4px 8px", minHeight: 32}}>×</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      ) : (
        <div style={{padding: 24, textAlign: "center", color: "var(--text-3)", border: "1px dashed var(--rule)", fontSize: 13}}>
          No entries yet. Add the next service and it'll stick around until you clear your browser.
        </div>
      )}
    </div>
  );
}

// expose
Object.assign(window, {
  SectionOverview, SectionSchedule, SectionFilters, SectionTracks,
  SectionLube, SectionAdjustments, SectionInspections, SectionParts, SectionTorque,
});

</script>
<script type="text/babel" data-presets="react">
/* ===== ac18-app.jsx ===== */
// ac18-app.jsx — AC-18 shell + nav + tweaks
const { useState, useEffect } = React;

const NAV = [
  { id: "overview",     num: "01", label: "Specification" },
  { id: "schedule",     num: "02", label: "Service schedule" },
  { id: "filters",      num: "03", label: "Filters & fluids" },
  { id: "tracks",       num: "04", label: "Tracks" },
  { id: "lube",         num: "05", label: "Lubrication & cooling" },
  { id: "adjustments",  num: "06", label: "Adjustments" },
  { id: "inspections",  num: "07", label: "Inspections" },
  { id: "parts",        num: "08", label: "UK parts" },
  { id: "torque",       num: "09", label: "Torque & faults" },
];

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#f4d20a",
  "density": "comfortable"
}/*EDITMODE-END*/;

function App() {
  const [active, setActive] = useState("overview");
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [tweaks, setTweak] = window.useTweaks
    ? window.useTweaks(TWEAK_DEFAULTS)
    : [TWEAK_DEFAULTS, () => {}];

  // Apply accent
  useEffect(() => {
    document.documentElement.style.setProperty("--hi", tweaks.accent);
  }, [tweaks.accent]);

  // Density
  useEffect(() => {
    document.body.style.fontSize = tweaks.density === "compact" ? "14px" : tweaks.density === "spacious" ? "17px" : "15px";
  }, [tweaks.density]);

  // Lock body scroll when drawer open
  useEffect(() => {
    document.body.classList.toggle("no-scroll", drawerOpen);
  }, [drawerOpen]);

  // Escape closes drawer
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") setDrawerOpen(false); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  // Scroll-spy
  useEffect(() => {
    const observer = new IntersectionObserver((entries) => {
      const visible = entries.filter(e => e.isIntersecting)
        .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
      if (visible[0]) setActive(visible[0].target.dataset.section);
    }, { rootMargin: "-10% 0px -70% 0px", threshold: 0 });
    document.querySelectorAll("section[data-section]").forEach(s => observer.observe(s));
    return () => observer.disconnect();
  }, []);

  const goTo = (id) => {
    setDrawerOpen(false);
    requestAnimationFrame(() => {
      const el = document.querySelector(`section[data-section="${id}"]`);
      if (el) {
        const top = el.getBoundingClientRect().top + window.scrollY - 20;
        window.scrollTo({ top, behavior: "smooth" });
      }
    });
  };

  const TweaksPanel = window.TweaksPanel;
  const TweakSection = window.TweakSection;
  const TweakRadio = window.TweakRadio;
  const TweakColor = window.TweakColor;

  const activeNav = NAV.find(n => n.id === active) || NAV[0];

  return (
    <div className="app">
      <header className="topbar">
        <div className="topbar-inner">
          <div
            className="topbar-brand"
            onClick={() => goTo("overview")}
            onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); goTo("overview"); } }}
            role="button"
            tabIndex={0}
            title="Back to cover"
            aria-label="Back to cover"
          >
            <div className="topbar-mark">AC<span className="dot">·</span>18</div>
            <div className="topbar-meta">
              FIELD SERVICE
              <strong>{activeNav.label}</strong>
            </div>
          </div>
          <button className="menu-btn" onClick={() => setDrawerOpen(true)} aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
              <path d="M4 7h16M4 12h16M4 17h16"/>
            </svg>
          </button>
        </div>
        <div className="hazard topbar-hazard" />
      </header>

      <div className={"scrim" + (drawerOpen ? " show" : "")} onClick={() => setDrawerOpen(false)} />

      <aside className={"rail" + (drawerOpen ? " open" : "")}>
        <button className="rail-close" onClick={() => setDrawerOpen(false)} aria-label="Close menu">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
            <path d="M6 6l12 12M18 6L6 18"/>
          </svg>
        </button>

        <div className="brand">
          <div className="brand-line">
            <span className="brand-pill">YANMAR</span>
            <span className="brand-pill alt">TRACKED</span>
          </div>
          <h1 className="brand-title">AC<span className="dot">·</span>18</h1>
          <div className="brand-sub">
            FIELD SERVICE MANUAL<br/>
            3TNE74 · 18 HP · 13.4 kW<br/>
            EDITION 2026 · UK
          </div>
        </div>

        <div className="hazard-sm" />

        <nav className="nav">
          <div className="nav-group">CONTENTS</div>
          {NAV.map(n => (
            <button
              key={n.id}
              className={"nav-item" + (active === n.id ? " active" : "")}
              onClick={() => goTo(n.id)}
            >
              <span className="num">{n.num}</span>
              <span>{n.label}</span>
            </button>
          ))}
        </nav>

        <div className="rail-foot">
          GREY-IMPORT REFERENCE<br/>
          VERIFY PART NUMBERS<br/>
          AGAINST ENGINE PLATE<br/>
          BEFORE ORDERING
        </div>
      </aside>

      <main>
        <div className="doc">
          <SectionOverview />
          <div style={{height: 64}}/>
          <SectionSchedule />
          <div style={{height: 64}}/>
          <SectionFilters />
          <div style={{height: 64}}/>
          <SectionTracks />
          <div style={{height: 64}}/>
          <SectionLube />
          <div style={{height: 64}}/>
          <SectionAdjustments />
          <div style={{height: 64}}/>
          <SectionInspections />
          <div style={{height: 64}}/>
          <SectionParts />
          <div style={{height: 64}}/>
          <SectionTorque />
        </div>
      </main>

      {TweaksPanel && (
        <TweaksPanel title="Tweaks">
          <TweakSection label="Accent">
            <TweakColor
              label="Colour"
              value={tweaks.accent}
              onChange={(v) => setTweak("accent", v)}
              options={["#f4d20a", "#ff6b1a", "#5db3a3", "#e6e9dc"]}
            />
          </TweakSection>
          <TweakSection label="Density">
            <TweakRadio
              label="Type"
              value={tweaks.density}
              onChange={(v) => setTweak("density", v)}
              options={[
                { value: "compact", label: "Compact" },
                { value: "comfortable", label: "Normal" },
                { value: "spacious", label: "Roomy" },
              ]}
            />
          </TweakSection>
        </TweaksPanel>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
